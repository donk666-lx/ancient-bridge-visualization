<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IronHill Scroll Animation | TTTISE</title>
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <section class="hero">
        <div class="hero-img">
            <img src="/porsche-911-gt3-rs-7680x4320-25139.jpg" alt="" />
        </div>

        <div class="hero-header">
        </div>

        <canvas class="hero-canvas"></canvas>

        <div class="hero-content">
            <div class="hero-subtitle">
                <p>承桥之韵，启智之汇。</p>
                <p>跨越边界，连接每一份思考。</p>
            </div>
            <h2>开起你的桥之旅</h2>
        </div>
    </section>

    <!-- 第二个项目内容 -->
    <section class="hero jeskojets-hero">
        <div class="sky-container">
            <img src="/sky.png" alt="" />

            <div class="sky-overlay">
                <div class="sky-center-block">
                    <div class="sky-year-badge">
                        <span class="sky-year-num">1916</span>
                        <span class="sky-year-label">年建</span>
                    </div>
                    <div class="sky-main-title">程阳永济桥</div>
                    <div class="sky-divider-line"></div>
                    <div class="sky-sub-slogan">无钉无铆 · 榫卯千秋</div>
                </div>

                <div class="poem">一桥飞架侗乡月<br />半入青山半入云</div>

                <div class="intro-bar">
                    <div class="intro-content">
                        <div class="intro-title">程阳永济桥</div>
                        <div class="intro-subtitle">广西三江·侗族木构古廊桥</div>
                        <div class="intro-desc">无钉无铆，榫卯匠心</div>
                        <div class="intro-honor">世界四大历史名桥之一</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="hero-copy">
            <h1>

            </h1>
        </div>

        <div class="window-container">
            <img src="/windows.png" alt="" />
        </div>

        <div class="hero-header">
            <div class="col">
                <h1>
                    静境通津
                </h1>
                <p>
                    通津桥，江南水乡标志性石拱桥，横跨清流，连接两岸烟火。半月般的桥身与水面相映，红灯笼、白墙黛瓦环绕，承载着百年岁月，在时光里静静诉说着江南的温婉与从容。
                </p>
            </div>
            <div class="col">
                <p>桥映水乡</p>
                <h1>
                    咫尺心安
                </h1>
            </div>
        </div>
    </section>

    <section class="outro">
        <h1>End of view.</h1>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.3.4/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="/script.js"></script>
</body>
</html>
