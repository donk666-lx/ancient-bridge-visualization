<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多孔石拱廊桥 · 结构信息可视化</title>
    <style>
        :root {
            --paper-bg: #f5ecd8;
            --paper-dark: #e8dcc8;
            --ink-black: #1a1a1a;
            --ink-gray: #4a4a4a;
            --accent-gold: #c9a227;
            --accent-gold-dark: #a88520;
            --accent-red: #8b4513;
            --shadow: rgba(0,0,0,0.15);
            --transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--paper-bg);
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,119,101,0.03) 2px, rgba(139,119,101,0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(139,119,101,0.03) 2px, rgba(139,119,101,0.03) 4px),
                radial-gradient(at 30% 20%, rgba(201,162,39,0.08) 0%, transparent 50%),
                radial-gradient(at 70% 80%, rgba(139,69,19,0.05) 0%, transparent 50%);
            font-family: "STKaiti", "KaiTi", "SimSun", serif;
            overflow: hidden;
            color: var(--ink-black);
        }

        /* 四角装饰 */
        body::before, body::after,
        .corner-bl, .corner-br {
            content: '';
            position: fixed;
            width: 80px; height: 80px;
            border: 3px solid var(--accent-gold-dark);
            opacity: 0.6;
            pointer-events: none;
            z-index: 100;
        }
        body::before { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        body::after { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        /* 返回首页按钮 */
        .home-btn {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 200;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, rgba(245,236,216,0.98) 0%, rgba(232,220,200,0.98) 100%);
            border: 2px solid var(--accent-gold);
            color: var(--ink-black);
            cursor: pointer;
            border-radius: 50%;
            font-family: "STKaiti", "KaiTi", serif;
            font-size: 1.2rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow:
                0 4px 15px rgba(0,0,0,0.1),
                inset 0 0 20px rgba(201,162,39,0.05);
        }

        .home-btn::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 1px dashed rgba(201,162,39,0.4);
            border-radius: 50%;
            pointer-events: none;
        }

        .home-btn::after {
            content: '首';
            font-size: 1.1rem;
            letter-spacing: 0;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-dark) 100%);
            color: white;
            transform: scale(1.1) rotate(-5deg);
            box-shadow:
                0 8px 25px rgba(201,162,39,0.4),
                0 0 30px rgba(201,162,39,0.2);
            border-color: #e6c050;
        }

        .home-btn:hover::after {
            content: '返';
        }

        .home-btn:active {
            transform: scale(0.95);
        }

        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            transition: var(--transition);
        }

        /* 页面标题 */
        .page-header {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            text-align: center;
            background: linear-gradient(180deg, rgba(245,236,216,0.95) 0%, rgba(245,236,216,0.8) 100%);
            padding: 15px 50px;
            border-radius: 8px;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .page-header h1 {
            margin: 0;
            font-size: 2.8rem;
            color: var(--ink-black);
            letter-spacing: 12px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .page-header .subtitle {
            font-size: 1.1rem;
            color: var(--accent-gold-dark);
            letter-spacing: 4px;
            margin-top: 8px;
        }

        .page-header::before,
        .page-header::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 1px;
            height: 20px;
            background: linear-gradient(180deg, transparent, var(--accent-gold), transparent);
        }
        .page-header::before { left: 25px; }
        .page-header::after { right: 25px; }

        /* 主视图区域 */
        .main-viewport {
            position: absolute;
            width: 82%;
            height: 72%;
            left: 50%;
            top: 55%;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: var(--transition);
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(245,236,216,0.2) 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 3px solid var(--accent-gold);
            box-shadow:
                inset 0 0 60px rgba(201,162,39,0.1),
                0 10px 40px rgba(0,0,0,0.15);
        }

        .main-viewport::before {
            content: '';
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px dashed rgba(201,162,39,0.4);
            pointer-events: none;
            z-index: 2;
            border-radius: 8px;
        }

        .is-detail .main-viewport {
            width: 38%;
            height: 55%;
            left: 30%;
            top: 52%;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2), 0 0 80px rgba(201,162,39,0.15);
        }

        .panorama-img {
            width: 95%;
            height: 95%;
            object-fit: contain;
            display: block;
            opacity: 0.95;
            transition: var(--transition);
            animation: fadeIn 1s ease-out;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.02); }
            to { opacity: 0.95; transform: scale(1); }
        }

        /* 热点按钮系统 */
        .spot-container {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spot-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, rgba(26,26,26,0.9) 0%, rgba(40,40,40,0.9) 100%);
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            cursor: pointer;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            white-space: nowrap;
            transition: var(--transition);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4), 0 0 0 0 rgba(201,162,39,0);
            font-family: "STKaiti", "KaiTi", serif;
            letter-spacing: 2px;
            animation: pulse 2.5s ease-in-out infinite;
            min-width: 80px;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 6px 20px rgba(0,0,0,0.4), 0 0 0 0 rgba(201,162,39,0.3);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 6px 25px rgba(0,0,0,0.4), 0 0 15px 5px rgba(201,162,39,0.2);
                transform: scale(1.02);
            }
        }

        .spot-container::after {
            content: '';
            width: 2px;
            background: linear-gradient(180deg, var(--accent-gold) 0%, transparent 100%);
            position: absolute;
            transition: var(--transition);
            pointer-events: none;
        }

        .dir-down::after { height: 40px; top: 100%; left: 50%; transform: translateX(-50%); }

        .spot-container::before {
            content: '';
            position: absolute;
            width: 0; height: 0;
            border-style: solid;
            transition: var(--transition);
            pointer-events: none;
        }

        .dir-down::before {
            border-width: 8px 6px 0 6px;
            border-color: var(--accent-gold) transparent transparent transparent;
            top: calc(100% + 40px);
            left: 50%;
            transform: translateX(-50%);
        }

        .spot-btn:hover {
            animation: none;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-dark) 100%);
            color: #1a1a1a;
            box-shadow: 0 8px 30px rgba(201,162,39,0.5);
            transform: scale(1.12);
            border-color: #e6c050;
        }

        .is-detail .spot-container { opacity: 0; pointer-events: none; }
        .is-detail .spot-container.active { opacity: 1; pointer-events: auto; }
        .is-detail .spot-container.active .spot-btn {
            background: var(--accent-gold);
            color: #1a1a1a;
            box-shadow: 0 0 30px rgba(201,162,39,0.6);
        }

        /* 坐标定位 */
        #loc-langding { top: 12%; left: 58%; }
        #loc-changjian { top: 22%; left: 43%; }
        #loc-gongquan { top: 28%; left: 50%; }
        #loc-zhenshuishou { top: 65%; left: 58%; }
        #loc-gongjiao { top: 72%; left: 38%; }
        #loc-lanban { top: 62%; left: 78%; }
        #loc-qiaotai { top: 74%; left: 22%; }
        #loc-qiaodun { top: 74%; left: 52%; }
        #loc-qiaobei { top: 70%; left: 12%; }

        /* 右侧详情面板 */
        .info-panel {
            position: absolute;
            right: -100%;
            top: 0;
            width: 42%;
            height: 100%;
            background: linear-gradient(180deg, rgba(245,236,216,0.98) 0%, rgba(240,228,208,0.98) 100%);
            padding: 80px 50px 60px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            transition: var(--transition);
            z-index: 5;
            border-left: 4px solid var(--accent-gold);
            box-shadow: -8px 0 40px rgba(0,0,0,0.12);
        }

        .is-detail .info-panel {
            right: 0;
        }

        .info-panel::before {
            content: '';
            position: absolute;
            top: 30px; left: 30px; right: 30px; bottom: 30px;
            border: 2px dashed rgba(201,162,39,0.3);
            pointer-events: none;
            border-radius: 8px;
        }

        .detail-img-box {
            width: 75%;
            max-width: 400px;
            aspect-ratio: 1/1;
            margin-bottom: 50px;
            overflow: hidden;
            border: 3px solid var(--accent-gold);
            border-radius: 8px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.18);
            position: relative;
            background: var(--paper-bg);
        }

        .detail-img-box::before,
        .detail-img-box::after {
            content: '';
            position: absolute;
            width: 25px; height: 25px;
            border: 4px solid var(--accent-gold-dark);
            z-index: 2;
        }
        .detail-img-box::before { top: -3px; left: -3px; border-right: none; border-bottom: none; }
        .detail-img-box::after { bottom: -3px; right: -3px; border-left: none; border-top: none; }

        .detail-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .detail-img-box:hover img {
            transform: scale(1.05);
        }

        .info-content {
            width: 100%;
            padding: 0 20px;
        }

        .info-panel h2 {
            font-size: 2.8rem;
            color: var(--ink-black);
            margin: 0 0 25px 0;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--accent-gold);
            display: inline-block;
            font-family: "STKaiti", "KaiTi", serif;
            letter-spacing: 6px;
            width: 100%;
            text-align: center;
        }

        .info-panel h2::before {
            content: '';
            display: inline-block;
            width: 30px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold));
            margin-right: 15px;
            vertical-align: middle;
        }

        .info-panel h2::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-gold), transparent);
            margin-left: 15px;
            vertical-align: middle;
        }

        .info-panel p {
            line-height: 2.2;
            font-size: 1.4rem;
            color: var(--ink-gray);
            text-align: justify;
            margin: 0;
            text-indent: 2.5em;
            font-family: "FangSong", "STFangsong", "KaiTi", serif;
        }

        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 35px;
            left: 100px;
            z-index: 100;
            padding: 14px 28px;
            background: rgba(245,236,216,0.95);
            border: 3px solid var(--accent-gold);
            color: var(--ink-black);
            cursor: pointer;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            display: none;
            font-family: "STKaiti", "KaiTi", serif;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .back-btn:hover {
            background: var(--accent-gold);
            color: white;
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(201,162,39,0.4);
        }

        .is-detail .back-btn {
            display: block;
        }

        .is-detail .page-header {
            opacity: 0;
            transform: translateX(-50%) translateY(-30px);
            transition: var(--transition);
        }

        /* 底部提示 */
        .hint {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.1rem;
            color: var(--accent-gold-dark);
            letter-spacing: 3px;
            opacity: 0.8;
            transition: var(--transition);
        }

        .is-detail .hint {
            opacity: 0;
        }

        .hint::before,
        .hint::after {
            content: '—';
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>

    <a href="../index.html" class="home-btn" title="返回首页"></a>

    <div class="scene" id="mainScene">
        <div class="page-header">
            <h1>多孔石拱廊桥</h1>
        </div>

        <button class="back-btn" onclick="exitDetail()">← 返回全景展示</button>

        <div class="main-viewport" id="viewport">
            <img src="images/shuanglong.jpg" class="panorama-img" alt="石拱桥全景">

            <div class="spot-container dir-down" id="loc-langding">
                <button class="spot-btn" onclick="showDetail('廊顶')">廊顶</button>
            </div>
            <div class="spot-container dir-down" id="loc-changjian">
                <button class="spot-btn" onclick="showDetail('敞肩拱')">敞肩拱</button>
            </div>
            <div class="spot-container dir-down" id="loc-gongquan">
                <button class="spot-btn" onclick="showDetail('拱券')">拱券</button>
            </div>
            <div class="spot-container dir-down" id="loc-zhenshuishou">
                <button class="spot-btn" onclick="showDetail('镇水兽')">镇水兽</button>
            </div>
            <div class="spot-container dir-down" id="loc-gongjiao">
                <button class="spot-btn" onclick="showDetail('拱脚')">拱脚</button>
            </div>
            <div class="spot-container dir-down" id="loc-lanban">
                <button class="spot-btn" onclick="showDetail('栏板')">栏板</button>
            </div>
            <div class="spot-container dir-down" id="loc-qiaotai">
                <button class="spot-btn" onclick="showDetail('桥台')">桥台</button>
            </div>
            <div class="spot-container dir-down" id="loc-qiaodun">
                <button class="spot-btn" onclick="showDetail('桥墩')">桥墩</button>
            </div>
            <div class="spot-container dir-down" id="loc-qiaobei">
                <button class="spot-btn" onclick="showDetail('桥碑')">桥碑</button>
            </div>
        </div>

        <div class="hint">点击标注查看建筑细节</div>

        <div class="info-panel">
            <div class="detail-img-box">
                <img id="target-img" src="" alt="细节展示">
            </div>
            <div class="info-content">
                <h2 id="target-title">部位名称</h2>
                <p id="target-desc">文字介绍加载中...</p>
            </div>
        </div>
    </div>

    <script>
        const dataMap = {
            '廊顶': { img: 'images/langding.jpg', desc: '廊桥顶部的防护与装饰结构，通过瓦当等元素实现排水与美化，覆盖青色筒瓦，飞檐翘角，气势恢宏。' },
            '拱券': { img: 'images/gongquan.jpg', desc: '石拱的核心承重单元，由楔形石块（拱石）相互咬合砌筑而成，呈弧形，是石拱桥的主体结构，可分为半圆拱、尖拱、圆弧拱等形制，承担桥面全部荷载并传递至桥墩。' },
            '敞肩拱': { img: 'images/jiangongqiao.jpg', desc: '在主拱的肩部（拱肩）增设的小拱，以赵州桥为标志性结构，主要作用是减轻桥体自重、便于泄洪，同时增强桥梁的稳定性和美观度。' },
            '桥墩': { img: 'images/qiaodun.png', desc: '支撑桥体的核心承重构件，位于水中或岸边，多为石质长方体、正方体或梯形，承接拱券或桥面的荷载，将其传递至地基。' },
            '桥台': { img: 'images/qiaotai.jpg', desc: '桥梁两端与河岸连接的支撑结构，石质砌筑，一端承接桥体，一端固定于河岸地基，起到固定桥体、衔接桥面与河岸的作用，防止桥体移位。' },
            '拱脚': { img: 'images/gongjiao.jpg', desc: '拱券最底部的支撑点，连接拱券与桥台/桥墩，是拱券受力的关键部位，需采用质地坚硬的石材砌筑，确保能够承受拱券传递的巨大压力。' },
            '栏板': { img: 'images/lanban.jpg', desc: '连接两根望柱之间的石板护栏，石质雕刻而成，可分为实心栏板和镂空栏板，表面常刻有山水、花鸟、人物、吉祥图案等，兼具防护与装饰功能。' },
            '镇水兽': { img: 'images/zhenshuishou.jpg', desc: '设置在桥首、桥栏或桥墩顶部的石质瑞兽（如狻猊、赑屃等），寓意镇水防灾、保佑桥梁稳固，是古代桥梁中常见的装饰性元素。' },
            '桥碑': { img: 'images/qiaobei.jpg', desc: '镶嵌在桥台或桥身的石质碑刻，记载建桥年代、捐建者、建桥工匠、桥的尺寸等信息，是研究古代桥梁历史的重要实物资料。' }
        };

        const scene = document.getElementById('mainScene');
        const detailImg = document.getElementById('target-img');
        const detailTitle = document.getElementById('target-title');
        const detailDesc = document.getElementById('target-desc');

        function showDetail(name) {
            const info = dataMap[name];
            detailImg.src = info.img;
            detailTitle.innerText = name;
            detailDesc.innerText = info.desc;
            scene.classList.add('is-detail');
            document.querySelectorAll('.spot-container').forEach(el => {
                el.classList.toggle('active', el.innerText.includes(name));
            });
        }

        function exitDetail() {
            scene.classList.remove('is-detail');
            document.querySelectorAll('.spot-container').forEach(el => el.classList.remove('active'));
        }
    </script>
</body>
</html>
